approvedGitRepositories:
  - "**"

enableScripts: true

nodeLinker: pnpm

# Fetch real optional native bindings for cross-platform electron-builder runs.
# Without this, Yarn may install mocked stubs for non-host native packages.
supportedArchitectures:
  os:
    - current
    - linux
    - win32
  cpu:
    - current
    - x64
    - arm64
  libc:
    - current
    - glibc

npmMinimalAgeGate: 0
