approvedGitRepositories:
  - "**"

enableScripts: true

nodeLinker: pnpm

# Fetch real optional native bindings for cross-platform electron-builder runs
# (e.g. dist-win on Linux or dist-linux on Windows). Without this, Yarn installs
# mocked stubs for non-host platforms and native modules such as @node-rs/xxhash
# and @parcel/watcher fail at runtime.
supportedArchitectures:
  os:
    - current
    - linux
    - win32
  cpu:
    - current
    - x64
    - arm64
  libc:
    - current
    - glibc

npmMinimalAgeGate: 0
