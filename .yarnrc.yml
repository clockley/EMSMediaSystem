approvedGitRepositories:
  - "**"

enableScripts: true

nodeLinker: pnpm

# Fetch real optional native bindings for cross-platform electron-builder runs.
# Without this, Yarn installs mocked stubs for non-host platforms and native
# modules such as @node-rs/xxhash fail at runtime.
supportedArchitectures:
  os:
    - current
    - linux
    - win32
  cpu:
    - current
    - x64
    - arm64
  libc:
    - current
    - glibc

npmMinimalAgeGate: 0
