approvedGitRepositories:
  - "**"

enableScripts: true

nodeLinker: pnpm

# Fetch real optional native bindings for cross-platform electron-builder runs
# (e.g. dist-win on Linux). Without this, Yarn installs mocked stubs for
# non-host platforms and @node-rs/xxhash fails at runtime with
# "Failed to load native binding".
supportedArchitectures:
  os:
    - current
    - linux
    - win32
  cpu:
    - current
    - x64
    - arm64

npmMinimalAgeGate: 0
