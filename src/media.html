<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>EJax Media System</title>
    <!-- https://electronjs.org/docs/tutorial/security#csp-meta-tag -->
    <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    style-src 'self' 'unsafe-inline';
    script-src 'self' 'unsafe-eval' 'unsafe-inline';
    object-src 'self';
    img-src * 'self' 'unsafe-inline' blob: data:;
    connect-src * blob: data:;
    frame-src 'self';
    media-src * 'self' blob: data:;
  ">
    <script type="importmap">
      {
        "imports": {
          "jszip": "./jszip-esm-wrapper.min.js",
          "fflate": "../../node_modules/fflate/esm/browser.js"
        }
      }
    </script>
    <style>
        @font-face {
            font-family: 'CMG Sans';
            font-display: swap;
            src: url('../../fonts/CMG Sans/Starter Set Styles/CMGSans-Regular.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
        }

        @font-face {
            font-family: 'CMG Sans';
            font-display: swap;
            src: url('../../fonts/CMG Sans/Extended Set Styles/CMGSans-Medium.ttf') format('truetype');
            font-weight: 500;
            font-style: normal;
        }

        @font-face {
            font-family: 'CMG Sans';
            font-display: swap;
            src: url('../../fonts/CMG Sans/Starter Set Styles/CMGSans-Bold.ttf') format('truetype');
            font-weight: 700;
            font-style: normal;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: black;
        }

        video {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
        }

        img {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
        }

        #pptxCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            display: none;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            z-index: 5;
        }

        #pptxCanvas .pptx-slide > * {
            max-width: 100%;
            max-height: 100%;
        }

        #textCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'CMG Sans';
            z-index: 10;
            overflow: hidden;
        }

        #textBackgroundVideo {
            position: absolute;
            inset: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 0;
            pointer-events: none;
        }

        #textContent {
            position: relative;
            z-index: 1;
            padding: 20px;
            max-width: 90%;
            word-wrap: break-word;
            text-align: center;
            white-space: pre-wrap;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.65);
            font-weight: 700;
            line-height: 1.32;
            overflow-wrap: anywhere;
        }

        #streamStatusOverlay {
            position: absolute;
            inset: 0;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            padding: 48px;
            box-sizing: border-box;
            background: #000;
            color: rgb(255 255 255 / 92%);
            font-family: 'CMG Sans';
            text-align: center;
        }

        #streamStatusOverlay[hidden] {
            display: none;
        }

        .stream-status-spinner {
            width: 56px;
            height: 56px;
            border-radius: 999px;
            border: 4px solid rgb(255 255 255 / 22%);
            border-top-color: rgb(255 255 255 / 86%);
            animation: stream-status-spin 900ms linear infinite;
        }

        .stream-status-error-symbol {
            display: none;
            width: 96px;
            height: 96px;
            color: rgb(255 255 255 / 72%);
        }

        #streamStatusOverlay[data-state="error"] .stream-status-spinner {
            display: none;
        }

        #streamStatusOverlay[data-state="error"] .stream-status-error-symbol {
            display: block;
        }

        .stream-status-title {
            margin-top: 2px;
            font-size: 30px;
            line-height: 1.2;
            font-weight: 600;
        }

        .stream-status-detail {
            max-width: min(720px, 86vw);
            color: rgb(255 255 255 / 62%);
            font-size: 17px;
            line-height: 1.45;
        }

        @keyframes stream-status-spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
    <script type="module" src="../../derived/src/media.min.mjs"></script>
</head>

<body>
    <video id="bigPlayer"></video>
    <div id="streamStatusOverlay" hidden>
        <div class="stream-status-spinner" aria-hidden="true"></div>
        <svg class="stream-status-error-symbol" viewBox="0 0 96 96" aria-hidden="true">
            <circle cx="48" cy="48" r="34" fill="none" stroke="currentColor" stroke-width="6" />
            <path d="M34 34l28 28M62 34L34 62" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" />
        </svg>
        <div id="streamStatusTitle" class="stream-status-title"></div>
        <div id="streamStatusDetail" class="stream-status-detail"></div>
    </div>
    <div id="pptxCanvas"></div>
    <div id="textCanvas">
        <div id="textContent"></div>
    </div>
</body>

</html>
