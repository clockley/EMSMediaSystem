        body {
            margin: 0;
            padding: 0;
            overflow: hidden;

        video {
            width: 100vw;
            height: 100vh;

        }

        #pptxCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            display: none;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            z-index: 5;
        }

        #pptxCanvas .pptx-slide > * {
            max-width: 100%;
            max-height: 100%;
        }

        #textCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'CMG Sans';
            z-index: 10;
            overflow: hidden;
        }

        #textBackgroundVideo {
            position: absolute;
            inset: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 0;
            pointer-events: none;
        }

        #textContent {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
        }

        .song-copyright-overlay {
            position: absolute;
            left: 2.5vw;
            right: 2.5vw;
            bottom: 2.4vh;
            z-index: 2;
            max-width: min(92vw, 1720px);
            color: rgba(255, 255, 255, 0.78);
            font-family: 'CMG Sans';
            font-size: clamp(14px, 1.9vh, 22px);
            line-height: 1.25;
            text-align: left;
            text-shadow: 0 2px 14px rgba(0, 0, 0, 0.72);
            white-space: pre-wrap;
            pointer-events: none;
        }

        .song-copyright-overlay[hidden] {
            display: none !important;
        }

        .scripture-render {
            --scripture-font-size: 66px;
            --scripture-reference-font-size: 38px;
            --scripture-attribution-font-size: 16px;
            --scripture-lower-third-font-size: 52px;
            --scripture-line-height: 1.32;
            --scripture-font-weight: 700;
            --scripture-color: #ffffff;
            --scripture-reference-color: rgba(255, 255, 255, 0.78);
            --scripture-reference-shadow: 0 2px 14px rgba(0, 0, 0, 0.72);
            --scripture-lower-third-backdrop: rgba(0, 0, 0, 0.74);
            font-family: 'CMG Sans';
            color: var(--scripture-color);
        }

        .scripture-render__box {
            min-width: 0;
            box-sizing: border-box;
        }

        .scripture-render__body,
        .scripture-render__reference,
        .scripture-render__attribution {
            font-family: inherit;
            font-weight: var(--scripture-font-weight);
            overflow-wrap: anywhere;
            word-break: normal;
            hyphens: auto;
            white-space: pre-wrap;
        }

        .scripture-render__body {
            color: var(--scripture-color);
            font-size: var(--scripture-font-size);
            line-height: var(--scripture-line-height);
            text-shadow: 0 2px 14px rgba(0, 0, 0, 0.72);
        }

        .scripture-render__reference {
            color: var(--scripture-reference-color);
            font-size: var(--scripture-reference-font-size);
            line-height: 1.2;
            margin-top: 0.62em;
            text-shadow: var(--scripture-reference-shadow);
        }

        .scripture-render__attribution {
            color: var(--scripture-reference-color);
            font-size: var(--scripture-attribution-font-size);
            line-height: 1.2;
            margin-top: 0.42em;
            text-shadow: var(--scripture-reference-shadow);
        }

        .scripture-render--fullscreen {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .scripture-render--fullscreen .scripture-render__box {
            width: min(90%, 1720px);
            display: grid;
            grid-template-rows: minmax(0, auto) auto;
            gap: clamp(16px, 2vh, 34px);
            max-height: 86%;
        }

        .scripture-render--fullscreen .scripture-render__body {
            min-height: 0;
        }

        .scripture-render--fullscreen .scripture-render__reference {
            margin-top: 0;
        }

        .scripture-render--fullscreen .scripture-render__attribution {
            margin-top: 0;
        }

        .scripture-render--slide-objects {
            display: block;
            position: relative;
            text-align: initial;
        }

        .slide-text-output-object {
            position: absolute;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .slide-output-object--image,
        .slide-output-object--shape {
            display: block;
        }

        .slide-output-object__image {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .slide-output-object__shape {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .slide-output-object__shape--line {
            inset: 50% 0 auto 0;
            height: 0;
            transform: translateY(-50%);
        }

        .slide-text-output-object__background {
            position: absolute;
            inset: 0;
            z-index: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            pointer-events: none;
        }

        .slide-text-output-object__background video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .slide-text-output-object__body {
            position: relative;
            z-index: 1;
            width: 100%;
            overflow-wrap: anywhere;
            white-space: pre-wrap;
            text-shadow: 0 2px 14px rgba(0, 0, 0, 0.72);
        }

        .slide-text-output-object__body .song-block {
            white-space: pre-wrap;
        }

        .song-block--spacer {
            min-height: 1em;
        }

        .scripture-render--lower-third {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            text-align: left;
            padding: 0 7.5% 7%;
        }

        .scripture-render--lower-third .scripture-render__box {
            width: min(84%, 1460px);
            padding: clamp(18px, 2.1vw, 34px) clamp(24px, 3vw, 46px);
            border-radius: 8px;
            background: var(--scripture-lower-third-backdrop);
            box-shadow: 0 18px 38px rgba(0, 0, 0, 0.32);
        }

        .scripture-render--lower-third .scripture-render__body {
            font-size: var(--scripture-lower-third-font-size);
            line-height: 1.18;
        }

        .scripture-render--lower-third .scripture-render__reference {
            font-size: clamp(18px, calc(var(--scripture-lower-third-font-size) * 0.42), 30px);
            margin-top: 0.48em;
        }

        .scripture-render--lower-third .scripture-render__attribution {
            font-size: clamp(12px, calc(var(--scripture-lower-third-font-size) * 0.24), 18px);
            margin-top: 0.38em;
        }

        .ems-slide-transition {
            animation-duration: var(--ems-slide-transition-duration, 350ms);
            animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
            animation-fill-mode: both;
            will-change: opacity, transform;
        }

        .ems-slide-transition--fade {
            animation-name: ems-slide-transition-fade;
        }

        .ems-slide-transition--slide-left {
            animation-name: ems-slide-transition-left;
        }

        .ems-slide-transition--slide-right {
            animation-name: ems-slide-transition-right;
        }

        .ems-slide-transition--zoom {
            animation-name: ems-slide-transition-zoom;
        }

        @keyframes ems-slide-transition-fade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes ems-slide-transition-left {
            from { opacity: 0; transform: translateX(3.5vw); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes ems-slide-transition-right {
            from { opacity: 0; transform: translateX(-3.5vw); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes ems-slide-transition-zoom {
            from { opacity: 0; transform: scale(0.965); }
            to { opacity: 1; transform: scale(1); }
        }

        #streamStatusOverlay {
            position: absolute;
            inset: 0;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            padding: 48px;
            box-sizing: border-box;
            background: #000;
            color: rgb(255 255 255 / 92%);
            font-family: 'CMG Sans';
            text-align: center;
        }

        #streamStatusOverlay[hidden] {
            display: none;
        }

        .stream-status-spinner {
            width: 56px;
            height: 56px;
            border-radius: 999px;
            border: 4px solid rgb(255 255 255 / 22%);
            border-top-color: rgb(255 255 255 / 86%);
            animation: stream-status-spin 900ms linear infinite;
        }

        .stream-status-error-symbol {
            display: none;
            width: 96px;
            height: 96px;
            color: rgb(255 255 255 / 72%);
        }

        #streamStatusOverlay[data-state="error"] .stream-status-spinner {
            display: none;
        }

        #streamStatusOverlay[data-state="error"] .stream-status-error-symbol {
            display: block;
        }

        .stream-status-title {
            margin-top: 2px;
            font-size: 30px;
            line-height: 1.2;
            font-weight: 600;
        }

        .stream-status-detail {
            max-width: min(720px, 86vw);
            color: rgb(255 255 255 / 62%);
            font-size: 17px;
            line-height: 1.45;
        }

        @keyframes stream-status-spin {
            to {
                transform: rotate(360deg);
            }
        }
