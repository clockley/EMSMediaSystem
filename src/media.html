<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>EJax Media System</title>
    <!-- https://electronjs.org/docs/tutorial/security#csp-meta-tag -->
    <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    style-src 'self' 'unsafe-inline';
    script-src 'self' 'unsafe-eval' 'unsafe-inline';
    object-src 'self';
    img-src * 'self' 'unsafe-inline' blob: data:;
    connect-src * blob: data:;
    frame-src 'self';
    media-src * 'self' blob: data:;
  ">
    <script type="importmap">
      {
        "imports": {
          "jszip": "../../src/jszip-esm-wrapper.js"
        }
      }
    </script>
    <style>
        @font-face {
            font-family: 'Nunito Sans';
            font-display: swap;
            src: url('../../fonts/NunitoSans/NunitoSans-SemiBold.ttf') format('truetype');
            font-weight: 600;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: black;
        }

        video {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
        }

        img {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
        }

        #pptxCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            display: none;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            z-index: 5;
        }

        #pptxCanvas .pptx-slide > * {
            max-width: 100%;
            max-height: 100%;
        }

        #textCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Nunito Sans', Arial, sans-serif;
            z-index: 10;
        }

        #textBackgroundVideo {
            position: absolute;
            inset: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -1;
        }

        #textContent {
            padding: 20px;
            max-width: 90%;
            word-wrap: break-word;
            text-align: center;
            white-space: pre-wrap;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.65);
            font-weight: 600;
            line-height: 1.45;
            overflow-wrap: anywhere;
        }
    </style>
    <script type="module" src="../../derived/src/media.min.mjs" async></script>
</head>

<body>
    <video id="bigPlayer"></video>
    <div id="pptxCanvas"></div>
    <div id="textCanvas">
        <div id="textContent"></div>
    </div>
</body>

</html>
